<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthCare Plus | Connected Hospital System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fc;
            color: #1e293b;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #0f2b3d 0%, #1a4a6f 100%);
            color: white;
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav-brand i {
            margin-right: 10px;
            color: #4fc3f7;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .role-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .logout-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #ef4444;
        }

        /* Dashboard Container */
        .dashboard-container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 24px;
        }

        .card:hover {
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
        }

        .card h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #1a4a6f;
            padding-left: 15px;
        }

        /* Grid */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        @media (max-width: 900px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }

        /* Vitals Row */
        .vital-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            transition: all 0.2s;
        }

        .vital-card.abnormal {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            animation: pulseRed 1s infinite;
        }

        @keyframes pulseRed {
            0% { background: #fee2e2; }
            50% { background: #ffc9c9; }
            100% { background: #fee2e2; }
        }

        .vital-value {
            font-size: 2rem;
            font-weight: 700;
            margin: 8px 0;
        }

        .vital-label {
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .emergency-badge {
            background: #ef4444;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
        }

        /* Buttons */
        .btn {
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: #1a4a6f;
            color: white;
        }

        .btn-primary:hover {
            background: #0f2b3d;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #1e293b;
        }

        .btn-outline:hover {
            background: #f1f5f9;
        }

        /* Alert */
        .alert-danger {
            background: #fee2e2;
            border-left: 4px solid #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #64748b;
        }

        /* AI Summary */
        .ai-summary {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        /* Report Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
        }

        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand"><i class="fas fa-hospital-user"></i> HealthCare Plus</div>
            <div class="user-info">
                <span class="role-badge" id="userRoleDisplay">Loading...</span>
                <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>
    <main class="dashboard-container" id="mainContent">
        <div class="empty-state">Loading system...</div>
    </main>

    <!-- Report Modal -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeReportModal()">&times;</span>
            <div id="modalReportContent"></div>
        </div>
    </div>

    <script>
        // ==================== COMPLETE BACKEND SIMULATION ====================
        // JWT + Role-based + Hashed Patient IDs + AI Integration + Emergency Detection
        
        // In-memory database with hashed patient IDs
        const SALT = "healthcare_salt_2026";
        
        function hashId(plainId) {
            // Simple hash for demo (would be bcrypt in production)
            let hash = 0;
            for (let i = 0; i < plainId.length; i++) {
                hash = ((hash << 5) - hash) + plainId.charCodeAt(i);
                hash |= 0;
            }
            return `PAT_${Math.abs(hash)}`;
        }
        
        // Patient registry: public ID -> hashed internal ID
        const patients = {
            "P1001": { hashedId: hashId("P1001"), name: "Emily Rodriguez", age: 45, room: "302" },
            "P1002": { hashedId: hashId("P1002"), name: "James Wilson", age: 62, room: "405" },
            "P2005": { hashedId: hashId("P2005"), name: "Sarah Chen", age: 34, room: "210" }
        };
        
        // Vitals data
        let vitalsDB = [
            { id: "v1", patientId: "P1001", createdAt: "2025-04-10T08:00:00", bloodPressureSystolic: 118, bloodPressureDiastolic: 78, heartRate: 72, temperature: 36.6, oxygenSaturation: 98 },
            { id: "v2", patientId: "P1001", createdAt: "2025-04-11T08:00:00", bloodPressureSystolic: 122, bloodPressureDiastolic: 80, heartRate: 75, temperature: 36.7, oxygenSaturation: 97 },
            { id: "v3", patientId: "P1001", createdAt: "2025-04-12T08:00:00", bloodPressureSystolic: 185, bloodPressureDiastolic: 110, heartRate: 115, temperature: 38.2, oxygenSaturation: 91 }, // EMERGENCY
            { id: "v4", patientId: "P1002", createdAt: "2025-04-11T09:30:00", bloodPressureSystolic: 145, bloodPressureDiastolic: 92, heartRate: 88, temperature: 37.0, oxygenSaturation: 95 },
            { id: "v5", patientId: "P1002", createdAt: "2025-04-12T09:30:00", bloodPressureSystolic: 142, bloodPressureDiastolic: 90, heartRate: 86, temperature: 36.9, oxygenSaturation: 96 },
            { id: "v6", patientId: "P2005", createdAt: "2025-04-12T10:00:00", bloodPressureSystolic: 110, bloodPressureDiastolic: 70, heartRate: 68, temperature: 36.5, oxygenSaturation: 99 }
        ];
        
        // Reports data
        let reportsDB = [
            { id: "R001", patientId: "P1001", title: "Cardiology Consultation", diagnosis: "Hypertension Risk", pdfUrl: "#", aiExplanation: "Patient shows elevated BP readings. Recommend low-sodium diet and regular monitoring. Recent spike indicates possible hypertensive crisis." },
            { id: "R002", patientId: "P1001", title: "Blood Work - April 2025", diagnosis: "Elevated Cholesterol", pdfUrl: "#", aiExplanation: "LDL levels above normal range. Statin therapy may be considered alongside lifestyle changes." },
            { id: "R003", patientId: "P1002", title: "Chest X-Ray Report", diagnosis: "Mild Cardiomegaly", pdfUrl: "#", aiExplanation: "Heart size slightly enlarged. Follow up with echocardiogram recommended." }
        ];
        
        // Current logged-in user (simulate JWT)
        let currentUser = { id: "doc1", role: "doctor", token: "jwt_token_demo" };
        
        // Helper: Role check middleware
        function requireRole(allowedRoles, action) {
            if (!allowedRoles.includes(currentUser.role)) {
                throw new Error(`Access denied: ${currentUser.role} not allowed. Required: ${allowedRoles.join(", ")}`);
            }
            return true;
        }
        
        // API Backend with JWT and role checks (simulated)
        const API = {
            async get(endpoint) {
                // Simulate network delay
                await new Promise(r => setTimeout(r, 100));
                
                // Token validation
                if (!currentUser.token) throw new Error("Unauthorized: No token");
                
                // GET /vitals/patient/:patientId
                if (endpoint.match(/\/vitals\/patient\/.+/)) {
                    requireRole(["doctor", "nurse"], "view vitals");
                    const patientId = endpoint.split("/").pop();
                    if (!patients[patientId]) throw new Error("Patient not found");
                    const patientVitals = vitalsDB.filter(v => v.patientId === patientId).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
                    return { success: true, data: patientVitals };
                }
                
                // GET /reports/patient/:patientId
                if (endpoint.match(/\/reports\/patient\/.+/)) {
                    requireRole(["doctor", "nurse"], "view reports");
                    const patientId = endpoint.split("/").pop();
                    if (!patients[patientId]) throw new Error("Patient not found");
                    const patientReports = reportsDB.filter(r => r.patientId === patientId);
                    return { success: true, data: patientReports };
                }
                
                // GET /reports/:id
                if (endpoint.match(/\/reports\/.+/)) {
                    requireRole(["doctor", "nurse"], "view report");
                    const reportId = endpoint.split("/").pop();
                    const report = reportsDB.find(r => r.id === reportId);
                    if (!report) throw new Error("Report not found");
                    return { success: true, data: report };
                }
                
                // POST /ai/patient-summary/:patientId
                if (endpoint.match(/\/ai\/patient-summary\/.+/)) {
                    requireRole(["doctor"], "AI insights");
                    const patientId = endpoint.split("/").pop();
                    if (!patients[patientId]) throw new Error("Patient not found");
                    const vitals = vitalsDB.filter(v => v.patientId === patientId);
                    const reports = reportsDB.filter(r => r.patientId === patientId);
                    
                    // Generate AI summary & risk alerts
                    let riskAlerts = [];
                    let summary = `Patient ${patients[patientId].name} (${patientId}). `;
                    
                    const latestVital = vitals.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt))[0];
                    if (latestVital) {
                        if (latestVital.bloodPressureSystolic > 140 || latestVital.bloodPressureDiastolic > 90) {
                            riskAlerts.push("⚠️ HYPERTENSION ALERT: Elevated BP requires intervention.");
                        }
                        if (latestVital.heartRate > 100) riskAlerts.push("❤️ TACHYCARDIA: Heart rate exceeds 100 bpm.");
                        if (latestVital.heartRate < 60) riskAlerts.push("🐢 BRADYCARDIA: Low heart rate detected.");
                        if (latestVital.temperature > 38.0) riskAlerts.push("🌡️ FEVER: Temperature elevated.");
                        if (latestVital.oxygenSaturation < 94) riskAlerts.push("🫁 HYPOXEMIA: Low oxygen saturation.");
                        summary += `Latest vitals: BP ${latestVital.bloodPressureSystolic}/${latestVital.bloodPressureDiastolic}, HR ${latestVital.heartRate}, Temp ${latestVital.temperature}°C. `;
                    }
                    
                    if (reports.length) {
                        summary += `Has ${reports.length} medical reports. Key findings: ${reports.map(r => r.diagnosis).join("; ")}. `;
                    }
                    
                    if (riskAlerts.length === 0) riskAlerts.push("✅ No immediate risks detected. Routine monitoring advised.");
                    
                    return { success: true, data: { summary, riskAlerts, patientName: patients[patientId].name } };
                }
                
                throw new Error("Endpoint not found");
            },
            
            async post(endpoint, body) {
                await new Promise(r => setTimeout(r, 100));
                if (!currentUser.token) throw new Error("Unauthorized");
                // For demo - any post returns success
                return { success: true };
            }
        };
        
        // ==================== UI RENDERING ====================
        let currentPatientId = null;
        let vitalsChart = null;
        
        async function loadPatientView(patientId) {
            currentPatientId = patientId;
            if (!patients[patientId]) {
                document.getElementById("mainContent").innerHTML = `
                    <div class="card empty-state">
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; color:#dc2626;"></i>
                        <h2>Patient Not Found</h2>
                        <p>Invalid Patient ID: ${patientId}</p>
                        <button class="btn btn-primary" onclick="showPatientSelector()">Back to Dashboard</button>
                    </div>
                `;
                return;
            }
            
            try {
                // Fetch vitals & reports
                const vitalsRes = await API.get(`/vitals/patient/${patientId}`);
                const reportsRes = await API.get(`/reports/patient/${patientId}`);
                const aiRes = await API.get(`/ai/patient-summary/${patientId}`);
                
                const vitals = vitalsRes.data;
                const reports = reportsRes.data;
                const aiData = aiRes.data;
                
                // Emergency detection: check latest vitals
                const latestVital = vitals.length > 0 ? vitals[0] : null;
                let emergencyFlags = [];
                if (latestVital) {
                    if (latestVital.bloodPressureSystolic > 140 || latestVital.bloodPressureDiastolic > 90) emergencyFlags.push("High BP");
                    if (latestVital.heartRate > 100 || latestVital.heartRate < 60) emergencyFlags.push("Abnormal HR");
                    if (latestVital.temperature > 38.0) emergencyFlags.push("Fever");
                    if (latestVital.oxygenSaturation < 94) emergencyFlags.push("Low SpO2");
                }
                
                const hasEmergency = emergencyFlags.length > 0;
                
                // Render UI
                const html = `
                    <div class="patient-header card">
                        <h2><i class="fas fa-user-circle"></i> ${patients[patientId].name} (ID: ${patientId})</h2>
                        <p>Age: ${patients[patientId].age} | Room: ${patients[patientId].room}</p>
                        ${hasEmergency ? `<div class="alert-danger"><i class="fas fa-bell"></i> 🚨 EMERGENCY ALERT: ${emergencyFlags.join(", ")}! Immediate attention required.</div>` : ""}
                    </div>
                    
                    <div class="grid-2">
                        <div class="card">
                            <h3><i class="fas fa-heartbeat"></i> Vital Signs & Trends</h3>
                            <canvas id="vitalsTrendChart" width="400" height="200" style="max-height: 250px; width:100%"></canvas>
                            <div class="grid-3" style="margin-top: 20px;">
                                ${vitals.slice(0,1).map(v => `
                                    <div class="vital-card ${(v.bloodPressureSystolic>140 || v.heartRate>100) ? 'abnormal' : ''}">
                                        <div class="vital-label">Blood Pressure</div>
                                        <div class="vital-value">${v.bloodPressureSystolic}/${v.bloodPressureDiastolic}</div>
                                        ${(v.bloodPressureSystolic>140) ? '<span class="emergency-badge">HIGH</span>' : ''}
                                    </div>
                                    <div class="vital-card ${(v.heartRate>100 || v.heartRate<60) ? 'abnormal' : ''}">
                                        <div class="vital-label">Heart Rate</div>
                                        <div class="vital-value">${v.heartRate} bpm</div>
                                        ${(v.heartRate>100) ? '<span class="emergency-badge">TACHY</span>' : (v.heartRate<60) ? '<span class="emergency-badge">BRADY</span>' : ''}
                                    </div>
                                    <div class="vital-card ${(v.temperature>38.0) ? 'abnormal' : ''}">
                                        <div class="vital-label">Temperature</div>
                                        <div class="vital-value">${v.temperature}°C</div>
                                    </div>
                                    <div class="vital-card ${(v.oxygenSaturation<94) ? 'abnormal' : ''}">
                                        <div class="vital-label">SpO2</div>
                                        <div class="vital-value">${v.oxygenSaturation}%</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="card">
                            <h3><i class="fas fa-file-alt"></i> Medical Reports</h3>
                            ${reports.length === 0 ? '<p>No reports available.</p>' : reports.map(r => `
                                <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #e2e8f0;">
                                    <div>
                                        <strong>${r.title}</strong><br>
                                        <small>${r.diagnosis}</small>
                                    </div>
                                    <button class="btn btn-outline" onclick="viewReport('${r.id}')"><i class="fas fa-eye"></i> View Report</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="card ai-summary">
                        <h3><i class="fas fa-robot"></i> AI Medical Summary & Risk Assessment</h3>
                        <p><strong>🤖 AI Analysis:</strong> ${aiData.summary}</p>
                        <div style="margin-top: 12px;">
                            ${aiData.riskAlerts.map(alert => `<div><i class="fas fa-exclamation-triangle"></i> ${alert}</div>`).join('')}
                        </div>
                        <small style="display:block; margin-top:12px;">✅ Generated by HealthCare AI v2.0</small>
                    </div>
                    
                    <div class="card">
                        <h3><i class="fas fa-chart-line"></i> Vitals History</h3>
                        <table style="width:100%; border-collapse: collapse;">
                            <thead><tr style="background:#f1f5f9;"><th>Date</th><th>BP (Sys/Dia)</th><th>HR</th><th>Temp</th><th>SpO2</th></tr></thead>
                            <tbody>
                                ${vitals.slice(0,5).map(v => `<tr style="border-bottom:1px solid #e2e8f0;">
                                    <td>${new Date(v.createdAt).toLocaleDateString()}</td>
                                    <td>${v.bloodPressureSystolic}/${v.bloodPressureDiastolic}</td>
                                    <td>${v.heartRate}</td>
                                    <td>${v.temperature}°C</td>
                                    <td>${v.oxygenSaturation}%</td>
                                </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                
                document.getElementById("mainContent").innerHTML = html;
                
                // Render Chart for BP trend
                const ctx = document.getElementById('vitalsTrendChart').getContext('2d');
                const dates = vitals.map(v => new Date(v.createdAt).toLocaleDateString()).reverse();
                const sysBP = vitals.map(v => v.bloodPressureSystolic).reverse();
                const diaBP = vitals.map(v => v.bloodPressureDiastolic).reverse();
                
                if (vitalsChart) vitalsChart.destroy();
                vitalsChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: [
                            { label: 'Systolic BP', data: sysBP, borderColor: '#ef4444', tension: 0.3, fill: false },
                            { label: 'Diastolic BP', data: diaBP, borderColor: '#3b82f6', tension: 0.3, fill: false }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: true }
                });
                
                // Notify doctor dashboard of emergency if needed (console simulation)
                if (hasEmergency && currentUser.role === 'doctor') {
                    console.log(`🚨 EMERGENCY NOTIFICATION to Doctor Dashboard: Patient ${patients[patientId].name} has ${emergencyFlags.join(", ")}`);
                    // Could also show toast
                    showToast("Emergency detected! Check patient immediately.", "emergency");
                }
                
            } catch (err) {
                console.error(err);
                document.getElementById("mainContent").innerHTML = `<div class="card empty-state"><h2>API Error</h2><p>${err.message}</p></div>`;
            }
        }
        
        // View single report with AI explanation
        window.viewReport = async function(reportId) {
            try {
                const res = await API.get(`/reports/${reportId}`);
                const report = res.data;
                const modalContent = `
                    <h2><i class="fas fa-file-pdf"></i> ${report.title}</h2>
                    <hr>
                    <p><strong>Diagnosis:</strong> ${report.diagnosis}</p>
                    <div style="background:#f1f5f9; padding:15px; border-radius:12px; margin:15px 0;">
                        <strong>🤖 AI Explanation:</strong><br> ${report.aiExplanation}
                    </div>
                    <div style="background:#e0f2fe; padding:12px; border-radius:12px;">
                        <i class="fas fa-chart-simple"></i> <strong>Clinical Insight:</strong> Based on patient history, follow-up recommended in 2 weeks.
                    </div>
                    <div style="margin-top:20px;">
                        <button class="btn btn-primary" onclick="closeReportModal()">Close</button>
                    </div>
                `;
                document.getElementById("modalReportContent").innerHTML = modalContent;
                document.getElementById("reportModal").style.display = "flex";
            } catch (err) {
                alert("Failed to load report: " + err.message);
            }
        };
        
        window.closeReportModal = function() {
            document.getElementById("reportModal").style.display = "none";
        };
        
        // Dashboard with patient selector
        async function showPatientSelector() {
            const role = currentUser.role;
            const patientListHtml = Object.entries(patients).map(([id, p]) => `
                <div style="background:white; border-radius:16px; padding:20px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center;">
                    <div><strong>${p.name}</strong><br><small>ID: ${id} | Room ${p.room}</small></div>
                    <button class="btn btn-primary" onclick="loadPatientView('${id}')"><i class="fas fa-stethoscope"></i> View Details</button>
                </div>
            `).join('');
            
            document.getElementById("mainContent").innerHTML = `
                <div class="card">
                    <h2><i class="fas fa-users"></i> Patient Dashboard</h2>
                    <p>Welcome, ${currentUser.role.toUpperCase()}! Select a patient to view complete medical history, vitals trends, and AI insights.</p>
                </div>
                <div class="card">
                    <h3>📋 Patient List</h3>
                    ${patientListHtml}
                </div>
                <div class="card">
                    <h3>🔒 Security Status</h3>
                    <p>✅ JWT Authentication Active | Role: ${currentUser.role} | Patient IDs Hashed Internally</p>
                    <p>🚨 Emergency Detection: Active | AI Integration: Online</p>
                </div>
            `;
        }
        
        // Toast notification system
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.right = '20px';
            toast.style.backgroundColor = type === 'emergency' ? '#ef4444' : '#1a4a6f';
            toast.style.color = 'white';
            toast.style.padding = '12px 20px';
            toast.style.borderRadius = '12px';
            toast.style.zIndex = '2000';
            toast.style.fontWeight = 'bold';
            toast.innerHTML = `<i class="fas fa-bell"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
        
        function handleLogout() {
            currentUser = null;
            alert("Logged out. (Demo: Refresh to login as doctor)");
            location.reload();
        }
        
        // Initialize role display and start
        async function init() {
            // Simulate JWT login (default doctor)
            document.getElementById("userRoleDisplay").innerHTML = `<i class="fas fa-user-md"></i> ${currentUser.role.toUpperCase()}`;
            await showPatientSelector();
            
            // Test role-based access demonstration
            console.log("System Ready: JWT + Roles + AI + Emergency Detection");
            // For nurse role test, uncomment but keeping doctor as default per requirement
        }
        
        // Handle URL param for direct patient view
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('patientId')) {
            window.addEventListener('DOMContentLoaded', () => {
                setTimeout(() => loadPatientView(urlParams.get('patientId')), 100);
            });
        } else {
            window.addEventListener('DOMContentLoaded', init);
        }
    </script>
</body>
