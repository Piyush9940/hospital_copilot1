<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PATIENT CHAT HISTORY - HealthCare Plus</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">HealthCare Plus</div>
            <div class="nav-menu"></div>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>
    <main class="dashboard-container">
        <!-- Managed by page-builder.js -->
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/page-builder.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.requireRole && requireRole(['patient'])) {
                await PageBuilder.buildPage({
                    title: 'PATIENT CHAT HISTORY',
                    subtitle: 'This page is currently under construction.',
                    allowedRoles: ['patient'],
                    renderFunction: () => '<div class="empty-state" style="padding: 50px; text-align: center;"><h2>Coming Soon</h2><p>This feature is being developed.</p><button class="btn btn-outline" onclick="window.history.back()">Go Back</button></div>'
                });
            }
        });
        function toggleMobileMenu() {
            document.querySelector('.nav-menu')?.classList.toggle('active');
        }
    </script>
</body>
</html>
