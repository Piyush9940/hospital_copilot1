<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - HealthCare Plus</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .book-form { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-weight: 500; color: #374151; }
        .form-input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; }
        .btn-submit { width: 100%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .btn-submit:hover { background: #059669; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">HealthCare Plus</div>
            <div class="nav-menu"></div>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>
    <main class="dashboard-container">
        <!-- Managed by page-builder.js -->
    </main>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/page-builder.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.requireRole && requireRole(['patient'])) {
                await PageBuilder.buildPage({
                    title: 'Book Appointment',
                    subtitle: 'Schedule a consultation with a specialist',
                    allowedRoles: ['patient'],
                    renderFunction: (data) => `
                        <div class="book-form">
                            <form id="bookForm" onsubmit="submitAppointment(event)">
                                <div class="form-group">
                                    <label class="form-label">Select Doctor</label>
                                    <select id="doctor" class="form-input" required>
                                        <option value="">Loading doctors...</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Date</label>
                                    <input type="date" id="date" class="form-input" required min="${new Date().toISOString().split('T')[0]}">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Time</label>
                                    <input type="time" id="time" class="form-input" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Consultation Type</label>
                                    <select id="type" class="form-input" required>
                                        <option value="video">Video Call</option>
                                        <option value="in-person">In Person</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Symptoms / Reason</label>
                                    <textarea id="symptoms" class="form-input" rows="3" required></textarea>
                                </div>
                                <button type="submit" class="btn-submit">Confirm Booking</button>
                            </form>
                        </div>
                    `
                });

                // Load doctors
                try {
                    const res = await API.get('/auth/users?role=doctor'); // A hacky fallback if /doctors isn't perfectly mapped. We will try /doctors first.
                } catch(e) {}
                
                try {
                    const doctorsData = await API.get('/doctors');
                    const doctors = Array.isArray(doctorsData) ? doctorsData : (Array.isArray(doctorsData.data) ? doctorsData.data : []);
                    const select = document.getElementById('doctor');
                    if (select) {
                        select.innerHTML = '<option value="">-- Choose a Specialist --</option>' + doctors.map(d => `<option value="${d.id || d.doctorId}">Dr. ${d.name || d.firstName || 'Doctor'} - ${d.specialization || 'General'}</option>`).join('');
                    }
                } catch(e) {
                    console.error('Failed to load doctors', e);
                    const select = document.getElementById('doctor');
                    if (select) select.innerHTML = '<option value="">Failed to load doctors</option>';
                }
            }
        });

        async function submitAppointment(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = 'Booking...';
            btn.disabled = true;

            const payload = {
                doctorId: document.getElementById('doctor').value,
                appointmentDate: document.getElementById('date').value,
                appointmentTime: document.getElementById('time').value,
                consultationType: document.getElementById('type').value,
                symptoms: document.getElementById('symptoms').value,
                patientId: window.Auth?.getUser()?.id || 1, // Fallback if user ID is missing
                fee: 500
            };

            try {
                const res = await API.post('/appointments', payload);
                if (window.Toast) Toast.show('Redirecting to payment...', 'success');
                else alert('Redirecting to payment...');
                
                const aptId = res?.data?.id || res?.id || 'PENDING';
                const docSelect = document.getElementById('doctor');
                const docText = docSelect.options[docSelect.selectedIndex].text;
                const docName = docText.split(' - ')[0] || 'Doctor';
                const specialty = docText.split(' - ')[1] || 'Specialist';
                
                setTimeout(() => {
                    const params = new URLSearchParams({
                        appointmentId: aptId,
                        fee: payload.fee,
                        doctor: docName,
                        specialty: specialty,
                        date: payload.appointmentDate,
                        time: payload.appointmentTime
                    });
                    window.location.href = `appointment-payment.html?${params.toString()}`;
                }, 1500);
            } catch (error) {
                if (window.Toast) Toast.show(error.message || 'Failed to book appointment', 'error');
                else alert(error.message || 'Failed to book appointment');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        function toggleMobileMenu() {
            document.querySelector('.nav-menu')?.classList.toggle('active');
        }
    </script>
</body>
</html>
