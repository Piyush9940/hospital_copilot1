<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Consultation - HealthCare Plus</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/video-call.css">
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
</head>
<body>
    <div class="video-call-container">
        <div class="video-header">
            <div class="call-info">
                <h2>Video Consultation</h2>
                <p id="callStatus">Connecting...</p>
                <p id="callDuration">00:00</p>
            </div>
            <div class="patient-info">
                <span id="doctorName">Dr. Loading...</span>
            </div>
        </div>

        <div class="video-grid">
            <div class="video-wrapper remote-video">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-placeholder" id="remotePlaceholder">
                    <div class="avatar-large">👨‍⚕️</div>
                    <p>Waiting for doctor...</p>
                </div>
                <div class="video-label">Doctor</div>
            </div>

            <div class="video-wrapper local-video">
                <video id="localVideo" autoplay playsinline muted></video>
                <div class="video-label">You</div>
            </div>
        </div>

        <div class="call-controls">
            <button class="control-btn" onclick="toggleMic()" id="micBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>

            <button class="control-btn" onclick="toggleVideo()" id="videoBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                </svg>
            </button>

            <button class="control-btn danger" onclick="endCall()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                </svg>
            </button>

            <button class="control-btn" onclick="toggleChat()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h10v2H7zm0 4h7v2H7z"/>
                </svg>
            </button>

            <button class="control-btn" onclick="shareScreen()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/>
                </svg>
            </button>
        </div>

        <div class="chat-panel" id="chatPanel" style="display: none;">
            <div class="chat-header">
                <h3>Chat</h3>
                <button onclick="toggleChat()">✕</button>
            </div>
            <div class="chat-messages" id="callChatMessages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="handleChatKeyPress(event)">
                <button onclick="sendChatMessage()">Send</button>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/video-call.js"></script>
</body>
</html>
