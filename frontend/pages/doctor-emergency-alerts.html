<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Emergency Command Center | HealthCare Plus</title>
    <!-- Google Fonts & simple icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            overflow-x: hidden;
        }

        /* Enhanced Navbar with connectivity */
        .navbar {
            background: linear-gradient(98deg, #0f172a 0%, #1e293b 100%);
            backdrop-filter: blur(0px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0.9rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-brand {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-brand i {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #3b82f6;
            font-size: 1.6rem;
        }

        .nav-menu {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .nav-link {
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link i {
            font-size: 1rem;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(59,130,246,0.2);
            color: white;
        }

        .nav-link.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 2px 8px rgba(59,130,246,0.4);
        }

        /* main container */
        .emergency-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* header with glow effect */
        .emergency-header {
            background: linear-gradient(115deg, #dc2626, #b91c1c, #991b1b);
            background-size: 200% 200%;
            color: white;
            padding: 2rem 2rem;
            border-radius: 32px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: 0 20px 35px -12px rgba(220,38,38,0.35);
            transition: all 0.2s;
            animation: gradientShift 5s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .emergency-header h1 {
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
        }

        .live-dot {
            width: 14px;
            height: 14px;
            background: #ffcccc;
            border-radius: 50%;
            display: inline-block;
            animation: pulseRed 1.2s infinite;
            box-shadow: 0 0 6px #ff4d4d;
        }

        @keyframes pulseRed {
            0% { transform: scale(1); opacity: 1; background: #ff5e5e; }
            50% { transform: scale(1.2); opacity: 0.9; background: #ff1a1a; box-shadow: 0 0 12px #ff4444; }
            100% { transform: scale(1); opacity: 1; background: #ff5e5e; }
        }

        .emergency-count {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.6rem;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            letter-spacing: -0.5px;
            transition: 0.2s;
        }

        /* alert grid improved */
        .alert-grid {
            display: grid;
            gap: 1.8rem;
        }

        .alert-card {
            background: white;
            border-radius: 28px;
            padding: 1.6rem 1.8rem;
            box-shadow: 0 12px 28px -8px rgba(0,0,0,0.08);
            border-left: 6px solid #e2e8f0;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }

        .alert-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 0% 0%, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
        }

        .alert-card.critical {
            border-left-color: #ef4444;
            background: linear-gradient(135deg, #fff, #fef2f2);
        }

        .alert-card.high {
            border-left-color: #f97316;
            background: linear-gradient(135deg, #fff, #fff7ed);
        }

        .alert-card.medium {
            border-left-color: #3b82f6;
            background: linear-gradient(135deg, #fff, #eff6ff);
        }

        .alert-card.low {
            border-left-color: #10b981;
            background: linear-gradient(135deg, #fff, #ecfdf5);
        }

        .alert-card:hover {
            transform: translateY(-5px) translateX(5px);
            box-shadow: 0 24px 40px -12px rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .alert-card {
            animation: slideIn 0.45s ease-out backwards;
        }

        /* badges modern */
        .priority-badge {
            padding: 0.3rem 1rem;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            backdrop-filter: blur(4px);
        }

        .priority-critical { background: #fee2e2; color: #b91c1c; border-left: 2px solid #ef4444; }
        .priority-high { background: #ffedd5; color: #c2410c; border-left: 2px solid #f97316; }
        .priority-medium { background: #dbeafe; color: #1e40af; border-left: 2px solid #3b82f6; }
        .priority-low { background: #d1fae5; color: #065f46; border-left: 2px solid #10b981; }

        /* patient details grid */
        .patient-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin: 1.2rem 0;
            padding: 1rem 1rem;
            background: rgba(248,250,252,0.8);
            border-radius: 20px;
            backdrop-filter: blur(2px);
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-weight: 700;
            color: #0f172a;
            font-size: 1rem;
            margin-top: 4px;
        }

        .alert-status {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1rem 0 0.8rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .sms-sent { color: #10b981; font-weight: 700; }
        .sms-failed { color: #ef4444; font-weight: 700; }
        .sms-pending { color: #f59e0b; font-weight: 700; }

        /* modern button group */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1.4rem;
        }

        .btn-acknowledge, .btn-resolve, .btn-view-patient {
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        .btn-acknowledge {
            background: #10b981;
            color: white;
            box-shadow: 0 2px 6px rgba(16,185,129,0.3);
        }

        .btn-resolve {
            background: #3b82f6;
            color: white;
            box-shadow: 0 2px 6px rgba(59,130,246,0.3);
        }

        .btn-view-patient {
            background: white;
            border: 1.5px solid #cbd5e1;
            color: #334155;
        }

        .btn-acknowledge:hover, .btn-resolve:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }

        .btn-view-patient:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            transform: translateY(-2px);
        }

        .resolved-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(16, 185, 129, 0.12);
            backdrop-filter: blur(1.5px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 800;
            color: #10b981;
            border-radius: 28px;
            letter-spacing: 2px;
            z-index: 2;
            pointer-events: none;
        }

        .alert-card.resolved {
            opacity: 0.85;
            filter: grayscale(0.03);
        }

        /* custom toast animation */
        @keyframes slideInRight {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* responsive finesse */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
            .nav-menu {
                width: 100%;
                justify-content: space-between;
            }
            .emergency-header {
                flex-direction: column;
                text-align: center;
            }
            .emergency-count {
                font-size: 1.2rem;
                padding: 0.3rem 1.2rem;
            }
            .alert-card {
                padding: 1.2rem;
            }
            .action-buttons {
                justify-content: center;
            }
            .patient-details {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .emergency-container {
                padding: 0 1rem;
            }
            .detail-value {
                font-size: 0.85rem;
            }
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #64748b;
            font-size: 0.8rem;
            border-top: 1px solid #e2e8f0;
            margin-top: 2.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-heartbeat"></i> 
                HealthCare Plus
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="#" class="nav-link" id="dashboardLink"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="#" class="nav-link active" id="emergencyLink"><i class="fas fa-exclamation-triangle"></i> Emergency Alerts</a>
                <a href="#" class="nav-link" id="patientsLink"><i class="fas fa-users"></i> My Patients</a>
                <a href="#" class="nav-link" id="profileLink"><i class="fas fa-user-md"></i> Profile</a>
            </div>
        </div>
    </nav>

    <div class="emergency-container">
        <div class="emergency-header">
            <div>
                <h1>
                    <span class="live-dot"></span> 
                    Emergency Command Center
                </h1>
                <p style="opacity: 0.9; margin-top: 8px;"><i class="fas fa-bell"></i> Real-time patient emergency notifications · Critical response hub</p>
            </div>
            <div class="emergency-count" id="activeAlerts">3 Active</div>
        </div>

        <div class="alert-grid" id="alertsGrid">
            <!-- dynamic alerts injected -->
        </div>
    </div>
    <footer>
        <i class="fas fa-shield-alt"></i> Live emergency monitoring · SMS & call escalation active
    </footer>

    <script>
        class EmergencyAlertsManager {
            constructor() {
                this.alerts = [];
                this.init();
            }

            init() {
                this.loadAlerts();
                this.startPolling();
                this.attachNavbarEvents();
            }

            attachNavbarEvents() {
                // Simulate connection to dashboard - all links will redirect to main dashboard (or keep alerts active)
                document.getElementById('dashboardLink')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.showToast('Navigating to Clinical Dashboard', 'info');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 400);
                });
                document.getElementById('emergencyLink')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.showToast('You are already on Emergency Alerts page', 'info');
                });
                document.getElementById('patientsLink')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.showToast('My Patients dashboard (simulated)', 'info');
                    // In real scenario could redirect, but for interactivity just toast
                });
                document.getElementById('profileLink')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.showToast('Doctor profile - Demo mode', 'info');
                });
            }

            loadAlerts() {
                // Enhanced alerts with additional meta for rich UI, but preserving all original attributes.
                this.alerts = [
                    {
                        id: 1,
                        patient: 'John Smith',
                        age: 65,
                        condition: 'Cardiac Arrest Risk',
                        priority: 'critical',
                        time: '2 minutes ago',
                        location: 'Home - 123 Main St',
                        vitals: { bp: '160/95', hr: '110', spo2: '92' },
                        smsStatus: 'sent',
                        callStatus: 'connected',
                        description: 'Patient experiencing severe chest pain with elevated BP. Immediate attention required.',
                        status: 'pending'
                    },
                    {
                        id: 2,
                        patient: 'Mary Johnson',
                        age: 72,
                        condition: 'Fall Detection',
                        priority: 'high',
                        time: '15 minutes ago',
                        location: 'Home - 456 Oak Ave',
                        vitals: { bp: '130/85', hr: '88', spo2: '96' },
                        smsStatus: 'sent',
                        callStatus: 'pending',
                        description: 'Fall detected by wearable device. Patient may have hip injury.',
                        status: 'acknowledged'
                    },
                    {
                        id: 3,
                        patient: 'Robert Davis',
                        age: 45,
                        condition: 'Diabetic Emergency',
                        priority: 'medium',
                        time: '30 minutes ago',
                        location: 'Workplace - 789 Business Park',
                        vitals: { bp: '120/80', hr: '95', spo2: '97' },
                        smsStatus: 'pending',
                        callStatus: 'pending',
                        description: 'Blood sugar levels critically low. Patient reporting dizziness and confusion.',
                        status: 'pending'
                    }
                ];
                this.renderAlerts();
                this.updateActiveCount();
            }

            renderAlerts() {
                const container = document.getElementById('alertsGrid');
                if (!container) return;

                const alertHtml = this.alerts.map(alert => {
                    // dynamic badge + color for spo2 / HR
                    const spo2Color = (alert.vitals.spo2 < 94) ? '#ef4444' : '#1f2937';
                    const hrWarning = (alert.vitals.hr > 105) ? 'style="color:#ef4444;"' : '';
                    
                    return `
                    <div class="alert-card ${alert.priority} ${alert.status === 'resolved' ? 'resolved' : ''}" id="alert-${alert.id}">
                        ${alert.status === 'resolved' ? '<div class="resolved-overlay"><i class="fas fa-check-circle"></i> RESOLVED</div>' : ''}
                        
                        <div class="alert-header" style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:10px;">
                            <div>
                                <span class="priority-badge priority-${alert.priority}"><i class="fas ${alert.priority === 'critical' ? 'fa-heartbeat' : alert.priority === 'high' ? 'fa-exclamation' : 'fa-bell'}"></i> ${alert.priority.toUpperCase()}</span>
                                <h3 style="margin: 0.7rem 0 0.2rem 0; font-size:1.35rem;">${this.escapeHtml(alert.patient)} <span style="font-size:0.9rem; color:#475569;">• ${alert.condition}</span></h3>
                            </div>
                            <span class="alert-time" style="background:#f1f5f9; padding:4px 12px; border-radius:40px;"><i class="far fa-clock"></i> ⏱️ ${alert.time}</span>
                        </div>

                        <p style="color: #334155; margin-bottom: 1rem; line-height:1.4;"><i class="fas fa-info-circle" style="color:#64748b;"></i> ${this.escapeHtml(alert.description)}</p>

                        <div class="patient-details">
                            <div class="detail-item">
                                <span class="detail-label"><i class="fas fa-calendar-alt"></i> Age</span>
                                <span class="detail-value">${alert.age} yrs</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label"><i class="fas fa-tachometer-alt"></i> BP</span>
                                <span class="detail-value" style="font-weight:800; ${alert.vitals.bp.includes('160') ? 'color:#dc2626;' : ''}">${alert.vitals.bp} mmHg</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label"><i class="fas fa-heart"></i> HR</span>
                                <span class="detail-value" ${hrWarning}>${alert.vitals.hr} BPM</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label"><i class="fas fa-lungs"></i> SpO₂</span>
                                <span class="detail-value" style="color:${spo2Color};">${alert.vitals.spo2}%</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label"><i class="fas fa-map-marker-alt"></i> Location</span>
                                <span class="detail-value"><i class="fas fa-home"></i> ${this.escapeHtml(alert.location)}</span>
                            </div>
                        </div>

                        <div class="alert-status">
                            <span class="status-indicator"><i class="fas fa-sms"></i> SMS: <span class="sms-${alert.smsStatus}">${alert.smsStatus.toUpperCase()}</span></span>
                            <span class="status-indicator"><i class="fas fa-phone-alt"></i> Call: <span class="sms-${alert.callStatus}">${alert.callStatus.toUpperCase()}</span></span>
                        </div>

                        ${alert.status !== 'resolved' ? `
                            <div class="action-buttons">
                                ${alert.status === 'pending' ? `<button class="btn-acknowledge" onclick="emergencyManager.acknowledge(${alert.id})"><i class="fas fa-check-circle"></i> Acknowledge</button>` : ''}
                                <button class="btn-resolve" onclick="emergencyManager.resolve(${alert.id})"><i class="fas fa-check-double"></i> Resolve</button>
                                <button class="btn-view-patient" onclick="emergencyManager.viewPatient(${alert.id})"><i class="fas fa-user-injured"></i> Full Profile</button>
                            </div>
                        ` : `<div style="margin-top:1rem; background:#e0f2fe; border-radius: 40px; padding:0.4rem 1rem; display:inline-block;"><i class="fas fa-check-circle" style="color:#059669;"></i> Resolved by clinician</div>`}
                    </div>
                `}).join('');
                
                container.innerHTML = alertHtml;
            }

            escapeHtml(str) {
                if(!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if(m === '&') return '&amp;';
                    if(m === '<') return '&lt;';
                    if(m === '>') return '&gt;';
                    return m;
                });
            }

            acknowledge(id) {
                const alert = this.alerts.find(a => a.id === id);
                if (alert && alert.status === 'pending') {
                    alert.status = 'acknowledged';
                    this.renderAlerts();
                    this.updateActiveCount();
                    this.showToast(`✅ Alert acknowledged for ${alert.patient} · Dispatched response team`, 'success');
                    // simulate SMS update
                    if(alert.smsStatus === 'pending') alert.smsStatus = 'sent';
                    if(alert.callStatus === 'pending') alert.callStatus = 'connected';
                    this.renderAlerts(); // re-render to reflect sms/call update
                } else if(alert && alert.status === 'acknowledged') {
                    this.showToast(`⚠️ Alert for ${alert.patient} already acknowledged`, 'info');
                }
            }

            resolve(id) {
                const alert = this.alerts.find(a => a.id === id);
                if (alert && alert.status !== 'resolved') {
                    if (confirm(`Resolve emergency alert for ${alert.patient}? This will mark as completed.`)) {
                        alert.status = 'resolved';
                        this.renderAlerts();
                        this.updateActiveCount();
                        this.showToast(`🎉 ${alert.patient}'s emergency resolved successfully`, 'success');
                    }
                } else if(alert && alert.status === 'resolved') {
                    this.showToast(`Alert is already resolved`, 'info');
                }
            }

            viewPatient(id) {
                const alert = this.alerts.find(a => a.id === id);
                if(alert) {
                    this.showToast(`🔍 Opening patient file: ${alert.patient} (Demo mode)`, 'info');
                    // simulate navigation, original code had doctor-patient-details.html. Keep behavior
                    setTimeout(() => {
                        // Original: window.location.href = `doctor-patient-details.html?id=${id}`;
                        // For demo, we avoid breaking but preserve the intention - use alert to mimic redirection
                        alert(`🚑 DEMO: Redirect to patient details for ${alert.patient} (ID: ${id})\nIn real system, would open full medical profile.`);
                    }, 100);
                }
            }

            updateActiveCount() {
                const active = this.alerts.filter(a => a.status !== 'resolved').length;
                const activeElement = document.getElementById('activeAlerts');
                if (activeElement) {
                    activeElement.textContent = `${active} Active`;
                    if(active > 0) {
                        activeElement.style.animation = 'none';
                        setTimeout(() => activeElement.style.animation = 'countPulse 1s infinite', 10);
                    }
                }
                // also blink header if critical pending
                const hasCritical = this.alerts.some(a => a.priority === 'critical' && a.status !== 'resolved');
                const header = document.querySelector('.emergency-header');
                if (hasCritical && active > 0) {
                    header.style.boxShadow = '0 0 0 3px rgba(239,68,68,0.5)';
                } else {
                    header.style.boxShadow = '0 20px 35px -12px rgba(220,38,38,0.35)';
                }
            }

            startPolling() {
                setInterval(() => {
                    // Simulate random real-time advisory: visual pulse for pending alerts
                    const pendingExists = this.alerts.some(a => a.status === 'pending');
                    if (pendingExists && Math.random() > 0.65) {
                        const header = document.querySelector('.emergency-header');
                        header.style.transform = 'scale(1.01)';
                        setTimeout(() => { if(header) header.style.transform = ''; }, 300);
                        this.showToast('⚠️ Real-time: pending emergency requires immediate action', 'warning');
                    }
                    // Simulate new incoming alert chance (but keeping original feature set)
                    if (Math.random() > 0.92 && this.alerts.length < 6) {
                        // dynamic additional demo alert, respects all properties, maintain integrity
                        const newId = Date.now();
                        const newAlert = {
                            id: newId,
                            patient: 'Eleanor Rigby',
                            age: 81,
                            condition: 'Respiratory Distress',
                            priority: 'high',
                            time: 'just now',
                            location: 'Assisted Living - 22 Sunset Blvd',
                            vitals: { bp: '148/92', hr: '102', spo2: '89' },
                            smsStatus: 'pending',
                            callStatus: 'pending',
                            description: 'Severe shortness of breath, SpO2 dropping. Emergency oxygen required.',
                            status: 'pending'
                        };
                        this.alerts.unshift(newAlert);
                        this.renderAlerts();
                        this.updateActiveCount();
                        this.showToast(`🚨 NEW EMERGENCY: ${newAlert.patient} - ${newAlert.condition}`, 'critical');
                        const audio = new Audio('data:audio/wav;base64,U3RlYWx0aCBzb3VuZCBzaW11bGF0aW9u'); // silent placeholder
                        audio.play().catch(e=>console.log);
                    }
                }, 14000);
            }

            showToast(message, type) {
                const toast = document.createElement('div');
                let bgColor = '#10b981';
                let icon = '✅';
                if(type === 'critical') { bgColor = '#dc2626'; icon = '🚨'; }
                else if(type === 'warning') { bgColor = '#f97316'; icon = '⚠️'; }
                else if(type === 'info') { bgColor = '#3b82f6'; icon = 'ℹ️'; }
                else { bgColor = '#10b981'; icon = '✓'; }
                
                toast.style.cssText = `
                    position: fixed; bottom: 24px; right: 24px; background: ${bgColor}; color: white;
                    padding: 0.9rem 1.5rem; border-radius: 60px; font-weight: 600; z-index: 10000;
                    animation: slideInRight 0.3s ease; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
                    backdrop-filter: blur(2px); font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
                    font-family: 'Inter', sans-serif; max-width: 320px;
                `;
                toast.innerHTML = `<i class="fas ${type === 'critical' ? 'fa-bell' : 'fa-info-circle'}"></i> ${message}`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
        }

        // attach to global for onclick binding
        window.emergencyManager = new EmergencyAlertsManager();
        
        // add style for count pulse
        const style = document.createElement('style');
        style.textContent = `
            @keyframes countPulse {
                0% { transform: scale(1); background: rgba(255,255,255,0.2); }
                50% { transform: scale(1.08); background: rgba(255,255,255,0.4); border-color: white; }
                100% { transform: scale(1); background: rgba(255,255,255,0.2); }
            }
            .emergency-count {
                animation: countPulse 1.5s infinite;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
