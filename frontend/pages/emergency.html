<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Emergency | Hospital Copilot</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/emergency.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="emergency-container">
        <div class="emergency-header">
            <h1>Emergency Assistance</h1>
            <p>Press the button below if you need immediate medical help.</p>
        </div>

        <div class="emergency-action">
            <div style="margin-bottom: 1.5rem; text-align: left;">
                <label style="display: block; font-weight: 600; color: #1e293b; margin-bottom: 0.5rem;"><i class="fa-solid fa-location-dot"></i> Location (Optional if GPS is on)</label>
                <input type="text" id="manualLocation" placeholder="Enter your address manually..." style="width: 100%; padding: 0.8rem; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; margin-bottom: 1rem;">
                
                <label style="display: block; font-weight: 600; color: #1e293b; margin-bottom: 0.5rem;"><i class="fa-solid fa-notes-medical"></i> Medical Context (Optional)</label>
                <textarea id="medicalContext" rows="3" placeholder="Describe your current situation, symptoms, or reason for emergency..." style="width: 100%; padding: 0.8rem; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; resize: vertical;"></textarea>
            </div>
            <button id="triggerEmergencyBtn" class="emergency-trigger-btn">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span>TRIGGER EMERGENCY</span>
            </button>
            <p class="voice-instruction" id="voiceInstruction"><i class="fa-solid fa-microphone"></i> Or just say "Help me"</p>
        </div>

        <div class="emergency-status-panel hidden" id="statusPanel">
            <div class="status-card">
                <h3><i class="fa-solid fa-location-dot"></i> Location Status</h3>
                <p id="locationStatus">Detecting location...</p>
            </div>
            
            <div class="status-card highlight">
                <h3><i class="fa-solid fa-truck-medical"></i> Request Status</h3>
                <p id="requestStatus">Waiting for action...</p>
            </div>

            <div class="status-card">
                <h3><i class="fa-solid fa-hospital"></i> Nearest Hospitals</h3>
                <ul id="hospitalsList" class="hospitals-list">
                    <li>Searching...</li>
                </ul>
            </div>
        </div>

        <button class="back-btn" onclick="window.history.back()">
            <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </button>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/emergency.js"></script>
</body>
</html>
